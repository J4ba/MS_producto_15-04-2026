name: Publicar imagen docker

on:
    push:
        branches:
          - main

jobs: 
    build-and_push:
        runs-on: ubuntu-latest

        setps:
            -name: Descargar el codigo del repo
            uses: action/checkout@v4

            -name: Iniciar sesion dockerhub
            uses: docker/login-action@v3
            with:
              username: ${{ secrets.DOCKERHUB_USERNAME }}
              password: ${{ secrets.DOCKERHUB_TOKEN }}
            
            -name: Build and push 
            uses: docker/build-push-action@v7
            with:
              contex: .
              push: true #debe ser true
              tags: ${{ secrets.DOCKERHUB_USERNAME }}/productos:latest #se cambio por user